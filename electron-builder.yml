appId: com.iotai.bot.installer
productName: IOTAI Bot Installer
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - package.json
asar: true

win:
  target:
    - target: nsis
      arch: [x64]
  forceCodeSigning: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  shortcutName: IOTAI Bot Installer

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities
  identity: null

dmg:
  title: IOTAI Bot Installer

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  maintainer: fonseca@iotai.dev
